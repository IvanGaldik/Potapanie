    /* Dark water tint as a pseudo overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,40,100,0.45) 0%,
        rgba(0,60,120,0.2) 40%,
        rgba(0,30,80,0.5) 100%
      );
      pointer-events: none;
      z-index: 0;
    }

    .bubbles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .bubble {
      position: absolute;
      bottom: -40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(0) translateX(0); opacity: 0.7; }
      50%  { transform: translateY(-50vh) translateX(15px); opacity: 0.5; }
      100% { transform: translateY(-105vh) translateX(-10px); opacity: 0; }
    }

    .fish {
      position: fixed;
      font-size: 1.6rem;
      z-index: 2;
      animation: swim linear infinite;
      pointer-events: none;
    }
    @keyframes swim {
      from { transform: translateX(-80px); }
      to   { transform: translateX(110vw); }
    }
    .fish-left {
      position: fixed;
      font-size: 1.6rem;
      z-index: 2;
      pointer-events: none;
      animation: swim-left linear infinite;
    }
    .fish-left span {
      display: inline-block;
      transform: scaleX(-1);
    }
    @keyframes swim-left {
      from { left: 110vw; }
      to   { left: -80px; }
    }

    .scene {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 540px;
      width: 95vw;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      color: #fff;
      text-shadow: 0 0 30px rgba(80,200,255,0.8), 0 2px 8px rgba(0,0,0,0.8);
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: clamp(0.9rem, 3vw, 1.05rem);
      color: rgba(220,240,255,0.97);
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1.6;
      text-shadow: 0 1px 8px rgba(0,0,0,0.9);
      margin-bottom: 0.3rem;
    }

    .cmuk {
      font-family: 'DM Sans', sans-serif;
      font-weight: 900;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      color: #ffdd57;
      text-shadow: 0 0 20px rgba(255,220,0,0.7), 0 2px 6px rgba(0,0,0,0.8);
      margin-bottom: 0.5rem;
    }

    .divers {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 0;
    }

    .diver {
      animation: float 4s ease-in-out infinite;
    }
    .diver:nth-child(2) { animation-delay: -2s; }

    .diver img {
      height: clamp(200px, 48vw, 300px);
      width: auto;
      object-fit: contain;
      display: block;
      /* screen blend: pure black (0,0,0) + any background = background color, so black disappears */
      mix-blend-mode: screen;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-1.5deg); }
      50%       { transform: translateY(-14px) rotate(1.5deg); }
    }
  </style>
</head>
<body>

  <div class="bubbles" id="bubbles"></div>

  <!-- Fish going right -->
  <div class="fish" style="top:12%;animation-duration:14s;animation-delay:-3s;">🐠</div>
  <div class="fish" style="top:55%;animation-duration:20s;animation-delay:-8s;font-size:1.1rem;">🐟</div>
  <div class="fish" style="top:80%;animation-duration:17s;animation-delay:-1s;font-size:2rem;">🐡</div>
  <div class="fish" style="top:35%;animation-duration:22s;animation-delay:-5s;font-size:1.2rem;">🐠</div>
  <div class="fish" style="top:68%;animation-duration:16s;animation-delay:-11s;font-size:1rem;">🐟</div>
  <!-- Fish going left -->
  <div class="fish-left" style="top:25%;animation-duration:18s;animation-delay:-2s;font-size:1.4rem;"><span>🐡</span></div>
  <div class="fish-left" style="top:45%;animation-duration:13s;animation-delay:-7s;font-size:1.1rem;"><span>🐠</span></div>
  <div class="fish-left" style="top:70%;animation-duration:21s;animation-delay:-4s;font-size:1.8rem;"><span>🐟</span></div>
  <div class="fish-left" style="top:15%;animation-duration:25s;animation-delay:-14s;font-size:0.9rem;"><span>🦐</span></div>
  <div class="fish-left" style="top:88%;animation-duration:15s;animation-delay:-9s;font-size:1.3rem;"><span>🐡</span></div>

  <div class="scene">
    <h1>Ideš sa potápať!</h1>
    <p class="subtitle">Viac informácií dostaneš od svojich naj kamošov.</p>
    <div class="cmuk">Cmuk! 💋</div>

    <div class="divers">
      <div class="diver">
        <img src="https://ivangaldik.github.io/Potapanie/filipsapotapa2.png" alt="Filip">
      </div>
      <div class="diver">
        <img src="https://ivangaldik.github.io/Potapanie/zuzasapotapa2.png" alt="Zuza">
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('bubbles');
    for (let i = 0; i < 22; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = Math.random() * 18 + 6;
      b.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        animation-duration: ${Math.random() * 8 + 6}s;
        animation-delay: -${Math.random() * 12}s;
      `;
      container.appendChild(b);
    }
  </script>
</body>
</html>
