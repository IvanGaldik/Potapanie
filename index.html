<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pozvánka</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    overflow:hidden;
    background: linear-gradient(#021b2e, #063e57 40%, #0a6a85 100%);
    color:white;
}

/* svetelné lúče vo vode */
body::before {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background: radial-gradient(circle at 50% -20%, rgba(255,255,255,0.25), transparent 60%);
}

/* text */
.text {
    position:absolute;
    top:8%;
    width:100%;
    text-align:center;
    font-size:28px;
    line-height:1.4;
    z-index:10;
}

/* diver */
.diver {
    position:absolute;
    width:140px;
    animation: float 6s ease-in-out infinite;
}

.diver2 {
    animation-delay:2s;
}

/* hlava */
.head {
    width:120px;
    border-radius:50%;
    display:block;
    margin:0 auto;
}

/* telo (neoprén) */
.body {
    width:50px;
    height:140px;
    background: linear-gradient(#111, #000);
    margin:-15px auto 0;
    border-radius:25px;
    position:relative;
}

/* ruky */
.body::before, .body::after {
    content:"";
    position:absolute;
    width:18px;
    height:90px;
    background:#000;
    top:10px;
    border-radius:10px;
}

.body::before { left:-18px; transform:rotate(20deg); }
.body::after { right:-18px; transform:rotate(-20deg); }

/* nohy */
.legs {
    width:40px;
    height:80px;
    margin:0 auto;
    position:relative;
}

.legs::before, .legs::after {
    content:"";
    position:absolute;
    width:16px;
    height:80px;
    background:#000;
    border-radius:10px;
}

.legs::before { left:0; }
.legs::after { right:0; }

/* plutvy */
.fins {
    width:70px;
    height:20px;
    background:#000;
    margin:5px auto;
    border-radius:10px;
}

/* pozície */
.diver1 { left:25%; bottom:18%; }
.diver2 { left:60%; bottom:22%; }

/* animácia */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<div class="text">
Ideš sa potápať!<br>
Viac informácií dostaneš od svojich naj kamošov.<br>
Cmuk!
</div>

<!-- diver 1 -->
<div class="diver diver1">
    <img class="head" src="TVOJ_OBRAZOK_1">
    <div class="body"></div>
    <div class="legs"></div>
    <div class="fins"></div>
</div>

<!-- diver 2 -->
<div class="diver diver2">
    <img class="head" src="TVOJ_OBRAZOK_2">
    <div class="body"></div>
    <div class="legs"></div>
    <div class="fins"></div>
</div>

</body>
</html>
